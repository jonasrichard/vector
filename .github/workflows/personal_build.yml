name: Personal Multi-arch Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. dev, my-fix)"
        required: false
        default: "dev"

env:
  IMAGE: ghcr.io/jonasrichard/vector

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            target: x86_64-unknown-linux-gnu
            suffix: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang libclang-dev pkg-config \
            libssl-dev libsasl2-dev protobuf-compiler \
            perl make

      - uses: ./.github/actions/setup
        with:
          rust: true

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Build Vector
        run: cargo build --release --no-default-features --features default-cmake --bin vector

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push per-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: distribution/docker/dev/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE }}:${{ inputs.tag }}-${{ matrix.suffix }}

  manifest:
    name: Merge manifest
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          TAG: ${{ inputs.tag }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            "${IMAGE}:${TAG}-amd64"
